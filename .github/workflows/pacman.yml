name: Generate Contribution Snake/Pacman Animation

on:
  # Executa automaticamente todos os dias à meia-noite (UTC)
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba Actions do GitHub
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Gera os arquivos SVG da animação
      - name: Generate SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#f9d71c

      # 2. Publica os arquivos gerados na branch pacman-output
      - name: Deploy to pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
