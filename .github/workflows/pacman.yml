name: Generate Contribution Snake Animation

on:
  # Executa automaticamente a cada 24 horas (meia-noite UTC)
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Gera os arquivos SVG da animação com cores e nomes ajustados
      - name: Generate SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg?palette=github-dark&color_snake=#f9d71c

      # 2. Publica os arquivos na branch pacman-output
      - name: Deploy to pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
