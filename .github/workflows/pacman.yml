name: Generate Contribution Snake Animation

on:
  # Executa automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Gera a animação a partir do seu histórico de contribuições
      - name: generate-github-user-contribution-grid-snake-svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/galaga-contribution-graph.svg
            dist/galaga-contribution-graph-dark.svg?palette=github-dark

      # Envia os arquivos gerados para a branch pacman-output
      - name: push galaga-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.5.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
