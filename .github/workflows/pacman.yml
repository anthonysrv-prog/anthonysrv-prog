name: Generate Contribution Pac-Man Animation

on:
  # Executa automaticamente a cada 24 horas (meia-noite UTC)
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Gera os arquivos SVG da animação do Pac-Man (Claro e Escuro)
      - name: Generate Pac-Man SVG
        uses: jonas-schmedtmann/github-readme-pacman@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 2. Publica os arquivos gerados na branch pacman-output
      - name: Deploy to pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
