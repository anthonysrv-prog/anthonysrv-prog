name: Generate Contribution Pac-Man Animation

on:
  schedule:
    - cron: "0 0 * * *" # Roda todo dia à meia-noite (UTC)
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate Pac-Man SVG
        uses: unknwon/github-readme-pacman@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Deploy to pacman-output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
