name: Generate Contribution Snake Animation

on:
  # Executa automaticamente a cada 24 horas
  schedule:
    - cron: "0 0 * * *"
  # Permite rodar manualmente na aba Actions
  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # 1. Baixa o repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Gera os gráficos de animação
      - name: Generate SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/galaga-contribution-graph.svg
            dist/galaga-contribution-graph-dark.svg?palette=github-dark

      # 3. Envia os arquivos diretamente para a branch pacman-output
      - name: Push to pacman-output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: pacman-output
